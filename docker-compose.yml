services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    working_dir: /app
    volumes:
      - ./audio:/app/audio
      - ./output:/app/output
      - hf_cache:/home/app/.cache/huggingface
    ports:
      - "8001:8001"
    environment:
      AI_CLEAN_ENABLED: "true"
      AI_CLEAN_PROVIDER: "ollama"
      AI_CLEAN_BASE_URL: "http://host.docker.internal:11434"
      AI_CLEAN_MODEL: "qwen3.5:9b"
      AI_CLEAN_TIMEOUT_SECONDS: "300"
      AI_CLEAN_TEMPERATURE: "0"
      AI_CLEAN_NUM_PREDICT: "2048"
      AI_CLEAN_FORMAT_JSON: "true"
      AI_CLEAN_THINK: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3)\"" ]
      interval: 15s
      timeout: 5s
      retries: 80
      start_period: 30s
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8001

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    working_dir: /app
    ports:
      - "8000:8000"
    depends_on:
      backend:
        condition: service_healthy
    command: python3 -m http.server 8000 --bind 0.0.0.0

volumes:
  hf_cache:
