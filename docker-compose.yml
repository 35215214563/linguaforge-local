services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    working_dir: /app
    volumes:
      - ./audio:/app/audio
      - ./output:/app/output
      - hf_cache:/home/app/.cache/huggingface
    ports:
      - "8001:8001"
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8001

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    working_dir: /app
    ports:
      - "8000:8000"
    depends_on:
      - backend
    command: python3 -m http.server 8000 --bind 0.0.0.0

volumes:
  hf_cache:
